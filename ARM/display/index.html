<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LapEE ARM Console</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07131f;
      --panel: #0c2031;
      --ink: #e9fbff;
      --muted: #8fb7c7;
      --blue: #55b8ff;
      --cyan: #5ff3ff;
      --green: #8dffb4;
      --warn: #ffd166;
      --bad: #ff6b7a;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      letter-spacing: 0;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr auto;
      background:
        linear-gradient(180deg, rgba(85,184,255,0.09), transparent 38%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.035) 0, rgba(255,255,255,0.035) 1px, transparent 1px, transparent 4px),
        var(--bg);
    }

    header, footer {
      padding: 18px 28px;
      border-color: rgba(95,243,255,0.28);
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      border-bottom: 1px solid rgba(95,243,255,0.28);
      background: rgba(7,19,31,0.84);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }

    .brand strong {
      font-size: 22px;
      line-height: 1.1;
      color: var(--ink);
    }

    .brand span, .meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .state {
      display: grid;
      align-content: center;
      justify-items: end;
      gap: 4px;
      min-width: 180px;
    }

    .pill {
      min-width: 112px;
      padding: 7px 12px;
      border: 1px solid rgba(141,255,180,0.55);
      background: rgba(141,255,180,0.09);
      color: var(--green);
      text-align: center;
      font-size: 14px;
      font-weight: 700;
    }

    main {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 22px;
      padding: 22px 28px;
      min-height: 0;
    }

    #stage {
      width: 100%;
      height: 100%;
      min-height: 360px;
      border: 1px solid rgba(95,243,255,0.22);
      background: radial-gradient(circle at 50% 35%, rgba(85,184,255,0.16), transparent 45%), rgba(12,32,49,0.44);
    }

    aside {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 14px;
      min-width: 0;
    }

    .panel {
      border: 1px solid rgba(95,243,255,0.24);
      background: rgba(12,32,49,0.58);
      padding: 16px;
    }

    h2 {
      margin: 0 0 12px;
      color: var(--cyan);
      font-size: 14px;
      font-weight: 700;
    }

    .kv {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 8px 12px;
      font-size: 13px;
      line-height: 1.35;
    }

    .kv div:nth-child(odd) { color: var(--muted); }
    .kv div:nth-child(even) {
      overflow: hidden;
      color: var(--ink);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log {
      min-height: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .log div {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    footer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      border-top: 1px solid rgba(95,243,255,0.28);
      background: rgba(7,19,31,0.84);
      font-size: 15px;
      color: var(--ink);
    }

    .url {
      overflow: hidden;
      color: var(--cyan);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto;
      }
      aside {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto;
      }
      .log { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <strong>LapEE / live attestation console</strong>
      <span>Raspberry Pi ARM64 node display</span>
    </div>
    <div class="state">
      <div class="pill" id="state">BOOTING</div>
      <div class="meta" id="clock">--:--:--</div>
    </div>
  </header>

  <main>
    <canvas id="stage" aria-label="Animated LapEE node display"></canvas>
    <aside>
      <section class="panel">
        <h2>NODE</h2>
        <div class="kv">
          <div>URL</div><div id="node-url">http://127.0.0.1:8734/</div>
          <div>HTTP</div><div id="http-state">probing</div>
          <div>Operator</div><div id="operator">unknown</div>
          <div>Devices</div><div id="devices">unknown</div>
        </div>
      </section>
      <section class="panel">
        <h2>ARM PORT</h2>
        <div class="kv">
          <div>Mode</div><div>non-attested</div>
          <div>Runtime</div><div>HyperBEAM foreground</div>
          <div>Display</div><div>local kiosk</div>
        </div>
      </section>
      <section class="panel log" id="log">
        <h2>EVENTS</h2>
      </section>
    </aside>
  </main>

  <footer>
    <div id="footer-text">Starting LapEE.</div>
    <div class="url" id="footer-url">http://127.0.0.1:8734/</div>
  </footer>

  <script>
    const api = 'http://127.0.0.1:8734';
    const stateEl = document.getElementById('state');
    const httpStateEl = document.getElementById('http-state');
    const operatorEl = document.getElementById('operator');
    const devicesEl = document.getElementById('devices');
    const footerEl = document.getElementById('footer-text');
    const footerUrlEl = document.getElementById('footer-url');
    const nodeUrlEl = document.getElementById('node-url');
    const logEl = document.getElementById('log');
    const clockEl = document.getElementById('clock');
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    const logs = [];
    let ready = false;
    let lastStatus = 'BOOTING';
    let phaseText = 'Starting HyperBEAM.';

    function addLog(text) {
      const stamp = new Date().toLocaleTimeString();
      logs.unshift(`[${stamp}] ${text}`);
      while (logs.length > 12) logs.pop();
      logEl.querySelectorAll('div').forEach((el) => el.remove());
      logs.forEach((line) => {
        const div = document.createElement('div');
        div.textContent = line;
        logEl.appendChild(div);
      });
    }

    function setState(text, ok) {
      lastStatus = text;
      stateEl.textContent = text;
      stateEl.style.color = ok ? 'var(--green)' : 'var(--warn)';
      stateEl.style.borderColor = ok ? 'rgba(141,255,180,0.55)' : 'rgba(255,209,102,0.6)';
      stateEl.style.background = ok ? 'rgba(141,255,180,0.09)' : 'rgba(255,209,102,0.09)';
    }

    function readPath(obj, path) {
      return path.reduce((value, key) => value && value[key], obj);
    }

    async function probe() {
      try {
        const res = await fetch(`${api}/~meta@1.0/info`, {
          headers: { accept: 'application/json', 'accept-bundle': 'true' },
          cache: 'no-store'
        });
        httpStateEl.textContent = `${res.status} ${res.statusText || ''}`.trim();
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        ready = true;
        setState('READY', true);
        phaseText = `Running at ${api}/`;
        footerEl.textContent = phaseText;
        footerUrlEl.textContent = `${api}/`;
        nodeUrlEl.textContent = `${api}/`;
        const operator =
          readPath(json, ['body', 'operator']) ||
          readPath(json, ['operator']) ||
          readPath(json, ['body', 'address']) ||
          'available';
        operatorEl.textContent = String(operator);
        const preloaded = readPath(json, ['body', 'preloaded-devices']) || readPath(json, ['preloaded-devices']);
        devicesEl.textContent = Array.isArray(preloaded) ? String(preloaded.length) : 'loaded';
      } catch (err) {
        ready = false;
        setState('HB STARTING', false);
        httpStateEl.textContent = err.message;
        phaseText = 'Starting HyperBEAM.';
        footerEl.textContent = phaseText;
      }
      addLog(`${lastStatus}: ${httpStateEl.textContent}`);
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * scale));
      canvas.height = Math.max(1, Math.floor(rect.height * scale));
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
    }

    function line(points, color, width = 1) {
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      points.forEach(([x, y], i) => i ? ctx.lineTo(x, y) : ctx.moveTo(x, y));
      ctx.stroke();
    }

    function drawLaptop(w, h, t) {
      const cx = w * 0.48;
      const cy = h * 0.52;
      const s = Math.min(w, h) * 0.34;
      const yaw = Math.sin(t * 0.0012) * 0.42;
      const lid = 1.0 + Math.min(0.8, t * 0.00008);
      const color = ready ? 'rgba(95,243,255,0.92)' : 'rgba(255,209,102,0.88)';
      const dim = 'rgba(143,183,199,0.34)';

      function p(x, y, z) {
        const x2 = x * Math.cos(yaw) - z * Math.sin(yaw);
        const z2 = x * Math.sin(yaw) + z * Math.cos(yaw);
        const k = 1 / (1 + z2 * 0.55);
        return [cx + x2 * s * k, cy + y * s * k];
      }

      const base = [
        p(-1.1, 0.35, -0.45), p(1.1, 0.35, -0.45),
        p(0.82, 0.55, 0.35), p(-0.82, 0.55, 0.35), p(-1.1, 0.35, -0.45)
      ];
      const hingeL = p(-0.82, 0.35, -0.42);
      const hingeR = p(0.82, 0.35, -0.42);
      const topL = p(-0.82, 0.35 - Math.sin(lid) * 1.12, -0.42 - Math.cos(lid) * 0.78);
      const topR = p(0.82, 0.35 - Math.sin(lid) * 1.12, -0.42 - Math.cos(lid) * 0.78);
      const backR = p(0.66, 0.35 - Math.sin(lid) * 0.92, -0.42 - Math.cos(lid) * 0.66);
      const backL = p(-0.66, 0.35 - Math.sin(lid) * 0.92, -0.42 - Math.cos(lid) * 0.66);

      line(base, color, 2);
      line([hingeL, topL, topR, hingeR], color, 2);
      line([backL, backR], dim, 1);
      line([hingeL, hingeR], 'rgba(141,255,180,0.75)', 2);
      line([p(-0.58, 0.42, -0.18), p(0.58, 0.42, -0.18), p(0.36, 0.48, 0.12), p(-0.36, 0.48, 0.12), p(-0.58, 0.42, -0.18)], dim, 1);
    }

    function drawQr(w, h, t) {
      const url = `${api}/`;
      const size = Math.min(132, Math.max(82, w * 0.16));
      const x0 = w - size - 30;
      const y0 = h - size - 30;
      const cells = 21;
      const cell = size / cells;
      ctx.fillStyle = 'rgba(233,251,255,0.06)';
      ctx.fillRect(x0 - 8, y0 - 8, size + 16, size + 16);
      ctx.fillStyle = ready ? 'rgba(95,243,255,0.92)' : 'rgba(143,183,199,0.48)';
      for (let y = 0; y < cells; y++) {
        for (let x = 0; x < cells; x++) {
          const finder = (x < 7 && y < 7) || (x > 13 && y < 7) || (x < 7 && y > 13);
          const seed = url.charCodeAt((x * 7 + y * 11) % url.length) + x * 13 + y * 17 + Math.floor(t / 700);
          if (finder || seed % 5 < 2) ctx.fillRect(x0 + x * cell, y0 + y * cell, Math.ceil(cell) - 1, Math.ceil(cell) - 1);
        }
      }
    }

    function render(t) {
      const rect = canvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = 'rgba(85,184,255,0.08)';
      for (let y = 28; y < h; y += 28) {
        ctx.fillRect(0, y, w, 1);
      }
      drawLaptop(w, h, t);
      drawQr(w, h, t);
      ctx.fillStyle = ready ? 'rgba(141,255,180,0.92)' : 'rgba(255,209,102,0.86)';
      ctx.font = '700 18px ui-monospace, monospace';
      ctx.fillText(lastStatus, 28, 38);
      ctx.fillStyle = 'rgba(233,251,255,0.72)';
      ctx.font = '14px ui-monospace, monospace';
      ctx.fillText(phaseText, 28, 62);
      requestAnimationFrame(render);
    }

    function tickClock() {
      clockEl.textContent = new Date().toLocaleTimeString();
    }

    window.addEventListener('resize', resize);
    resize();
    tickClock();
    probe();
    setInterval(tickClock, 1000);
    setInterval(probe, 3000);
    requestAnimationFrame(render);
  </script>
</body>
</html>
